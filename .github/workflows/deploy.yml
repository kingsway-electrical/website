name: Deploy to GitHub Pages

# Build and publish the static site whenever main changes, plus a weekly
# Sunday run that re-stamps the "last updated" date for freshness.
on:
  push:
    branches: [main]
  schedule:
    # Sunday 06:17 UTC. Off-the-hour to dodge GitHub's busy scheduler slots.
    - cron: "17 6 * * 0"
  workflow_dispatch:

# pages/id-token: deploy. contents: write so the weekly run can commit the
# refreshed date back (keeps the repo active, see "Commit refreshed date").
permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Stamp today's date into the footer "last updated" line (the <time>
      # element) and the sitemap <lastmod>. Runs on every deploy, so the
      # live date is always the date the site was actually published.
      - name: Stamp last-updated date
        run: |
          ISO="$(date -u +%F)"
          HUMAN="$(date -u +'%-d %B %Y')"
          for f in index.html residential.html commercial.html; do
            sed -i -E "s|<time datetime=\"[0-9]{4}-[0-9]{2}-[0-9]{2}\">[^<]*</time>|<time datetime=\"$ISO\">$HUMAN</time>|" "$f"
          done
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>$ISO</lastmod>|g" sitemap.xml
          echo "Stamped $HUMAN ($ISO)"

      # On the weekly run (and manual triggers), commit the refreshed date
      # back. This keeps the source in sync and keeps the repo "active" —
      # GitHub disables cron workflows after 60 days with no commits. The
      # push uses GITHUB_TOKEN, which never re-triggers workflows, so there
      # is no loop; the deploy below still runs in this same job.
      - name: Commit refreshed date
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet; then
            echo "Date unchanged; nothing to commit."
          else
            git config user.name  "kingsway-electrical[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "refresh last-updated date"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # The site is plain static HTML/CSS — no build step. Upload the repo root.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
